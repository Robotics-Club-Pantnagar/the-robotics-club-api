        - Teams
    delete:
      operationId: TeamsController_remove
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
        - user-auth: []
      summary: Delete team (Team leader or Admin)
      tags:
        - Teams
  /teams/{id}/leader:
    patch:
      operationId: TeamsController_transferLeadership
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferLeadershipDto'
      responses:
        '200':
          description: ''
      security:
        - user-auth: []
      summary: Transfer team leadership to another team member (Current leader only)
      tags:
        - Teams
  /teams/{id}/join-request:
    post:
      operationId: TeamsController_requestJoin
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinTeamRequestDto'
      responses:
        '201':
          description: ''
      security:
        - user-auth: []
      summary: Request to join a team for an event (Participant)
      tags:
        - Teams
  /teams/{id}/join-requests:
    get:
      operationId: TeamsController_listJoinRequests
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: eventId
          required: false
          in: query
          description: Optional event ID filter for pending requests
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - user-auth: []
      summary: List pending join requests (Team leader only)
      tags:
        - Teams
  /teams/{id}/join-requests/{participantId}:
    patch:
      operationId: TeamsController_reviewJoinRequest
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: participantId
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewJoinRequestDto'
      responses:
        '200':
          description: ''
      security:
        - user-auth: []
      summary: Approve or reject a join request (Team leader only)
      tags:
        - Teams
  /teams/{id}/members/{participantId}:
    delete:
      operationId: TeamsController_removeMember
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: participantId
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - user-auth: []
      summary: Remove member from team (Team leader only)
      tags:
        - Teams
  /members:
    get:
      operationId: MembersController_findAll
      parameters:
        - name: limit
          required: false
          in: query
          description: Number of items to return
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
        - name: offset
          required: false
          in: query
          description: Number of items to skip
          schema:
            minimum: 0
            default: 0
            type: number
        - name: search
          required: false
          in: query
          description: Search by name or username
          schema:
            type: string
        - name: position
          required: false
          in: query
          description: Filter by position title
          schema:
            type: string
        - name: collegeId
          required: false
          in: query
          description: Filter by college ID
          schema:
            type: string
        - name: departmentId
          required: false
          in: query
          description: Filter by department ID
          schema:
            type: string
        - name: graduationYear
          required: false
          in: query
          description: Filter by graduation year
          schema:
            type: number
      responses:
        '200':
          description: ''
      summary: List all club members with filters
      tags:
        - Members
  /members/{id}:
    get:
      operationId: MembersController_findOne
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: Get member by ID with positions
      tags:
        - Members
    patch:
      operationId: MembersController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemberDto'
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Update member profile (Self or Admin)
      tags:
        - Members
    delete:
      operationId: MembersController_remove
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Remove member (Admin only)
      tags:
        - Members
  /members/invite:
    post:
      description: >-
        Sends a Clerk invitation to the email. Member profile is created with pending status. The invitation is accepted
        via Clerk, which triggers a webhook to activate the member.
      operationId: MembersController_invite
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteMemberDto'
      responses:
        '201':
          description: ''
      security:
        - team-auth: []
      summary: Invite a new member (Admin only)
      tags:
        - Members
  /members/{id}/positions:
    get:
      operationId: PositionsController_getPositionHistory
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: Get position history for a member
      tags:
        - Positions
    post:
      operationId: PositionsController_create
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePositionDto'
      responses:
        '201':
          description: ''
      security:
        - team-auth: []
      summary: Assign position to member (Admin only)
      tags:
        - Positions
  /positions/current:
    get:
      description: Returns positions where endYear IS NULL AND endMonth IS NULL (ongoing positions)
      operationId: PositionsController_getCurrentLeadership
      parameters: []
      responses:
        '200':
          description: ''
      summary: Get current leadership
      tags:
        - Positions
  /positions/year/{year}:
    get:
      description: Returns positions active during the specified year (startYear <= year AND (endYear IS NULL OR endYear >= year))
      operationId: PositionsController_getLeadershipByYear
      parameters:
        - name: year
          required: true
          in: path
          description: Year to query (2000-2100)
          schema:
            type: number
      responses:
        '200':
          description: ''
      summary: Get leadership by year
      tags:
        - Positions
  /positions/{id}:
    patch:
      operationId: PositionsController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePositionDto'
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Update position (Admin only)
      tags:
        - Positions
    delete:
      operationId: PositionsController_remove
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Remove position (Admin only)
      tags:
        - Positions
  /projects:
    get:
      operationId: ProjectsController_findAll
      parameters:
        - name: limit
          required: false
          in: query
          description: Number of items to return
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
        - name: offset
          required: false
          in: query
          description: Number of items to skip
          schema:
            minimum: 0
            default: 0
            type: number
        - name: search
          required: false
          in: query
          description: Search by project title
          schema:
            type: string
        - name: tags
          required: false
          in: query
          description: Filter by tags
          schema:
            type: array
            items:
              type: string
        - name: memberId
          required: false
          in: query
          description: Filter by member ID
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: List all projects with filters
      tags:
        - Projects
    post:
      operationId: ProjectsController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectDto'
      responses:
        '201':
          description: ''
      security:
        - team-auth: []
      summary: Create a new project (Member only)
      tags:
        - Projects
  /projects/{id}:
    get:
      operationId: ProjectsController_findOne
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: Get project by ID with members
      tags:
        - Projects
    patch:
      operationId: ProjectsController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectDto'
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Update project (Project member only)
