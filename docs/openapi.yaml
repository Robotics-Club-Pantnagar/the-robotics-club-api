openapi: 3.0.0
paths:
  /colleges:
    get:
      operationId: CollegesController_findAll
      parameters:
        - name: limit
          required: false
          in: query
          description: Number of items to return
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
        - name: offset
          required: false
          in: query
          description: Number of items to skip
          schema:
            minimum: 0
            default: 0
            type: number
        - name: search
          required: false
          in: query
          description: Search term for college name or code
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollegesController_findAll_200Response'
              example:
                success: true
                data:
                  items:
                    - name: MIT
                      code: MIT001
                      location: Cambridge, MA
                  total: 1
                  limit: 20
                  offset: 0
        '400':
          $ref: '#/components/responses/CommonBadRequest'
        '429':
          $ref: '#/components/responses/CommonRateLimited'
        '500':
          $ref: '#/components/responses/CommonInternalError'
      summary: List all colleges with pagination
      tags:
        - Colleges
    post:
      operationId: CollegesController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollegeDto'
            example:
              name: MIT
              code: MIT001
              location: Cambridge, MA
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollegesController_create_201Response'
              example:
                success: true
                data:
                  name: MIT
