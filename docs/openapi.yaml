openapi: 3.0.0
paths:
  /colleges:
    get:
      operationId: CollegesController_findAll
      parameters:
        - name: limit
          required: false
          in: query
          description: Number of items to return
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
        - name: offset
          required: false
          in: query
          description: Number of items to skip
          schema:
            minimum: 0
            default: 0
            type: number
        - name: search
          required: false
          in: query
          description: Search term for college name or code
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: List all colleges with pagination
      tags:
        - Colleges
    post:
      operationId: CollegesController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollegeDto'
      responses:
        '201':
          description: ''
      security:
        - team-auth: []
      summary: Create a new college (Admin only)
      tags:
        - Colleges
  /colleges/{id}:
    get:
      operationId: CollegesController_findOne
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: Get college by ID
      tags:
        - Colleges
    patch:
      operationId: CollegesController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCollegeDto'
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Update college (Admin only)
      tags:
        - Colleges
    delete:
      operationId: CollegesController_remove
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Delete college (Admin only)
      tags:
        - Colleges
  /colleges/{collegeId}/departments:
    get:
      operationId: CollegesController_findDepartments
      parameters:
        - name: collegeId
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: List departments for a college
      tags:
        - Colleges
  /departments/{id}:
    get:
      operationId: DepartmentsController_findOne
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: Get department by ID
      tags:
        - Departments
    patch:
      operationId: DepartmentsController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDepartmentDto'
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Update department (Admin only)
      tags:
        - Departments
    delete:
      operationId: DepartmentsController_remove
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Delete department (Admin only)
      tags:
        - Departments
  /departments:
    post:
      operationId: DepartmentsController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDepartmentDto'
      responses:
        '201':
          description: ''
      security:
        - team-auth: []
      summary: Create a new department (Admin only)
      tags:
        - Departments
  /events:
    get:
      operationId: EventsController_findAll
      parameters:
        - name: limit
          required: false
          in: query
          description: Number of items to return
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
        - name: offset
          required: false
          in: query
          description: Number of items to skip
          schema:
            minimum: 0
            default: 0
            type: number
        - name: search
          required: false
          in: query
          description: Search by event title
          schema:
            type: string
        - name: eventType
          required: false
          in: query
          description: Filter by event type
          schema:
            type: string
            enum:
              - INDUCTION
              - WORKSHOP
              - COMPETITION
              - SEMINAR
              - HACKATHON
              - MEETUP
              - OTHER
        - name: hasTeam
          required: false
          in: query
          description: Filter team-based events
          schema:
            type: boolean
        - name: upcoming
          required: false
          in: query
          description: Filter upcoming events only
          schema:
            type: boolean
        - name: past
          required: false
          in: query
          description: Filter past events only
          schema:
            type: boolean
      responses:
        '200':
          description: ''
      summary: List all events with filters and pagination
      tags:
        - Events
    post:
      operationId: EventsController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventDto'
      responses:
        '201':
          description: ''
      security:
        - team-auth: []
      summary: Create a new event (Admin only)
      tags:
        - Events
  /events/{id}:
    get:
      operationId: EventsController_findOne
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: Get event by ID with schedules
      tags:
        - Events
    patch:
      operationId: EventsController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventDto'
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Update event (Admin only)
      tags:
        - Events
    delete:
      operationId: EventsController_remove
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Delete event (Admin only)
      tags:
        - Events
  /events/{id}/schedules:
    post:
      operationId: EventsController_addSchedule
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduleDto'
      responses:
        '201':
          description: ''
      security:
        - team-auth: []
      summary: Add schedule to event (Admin only)
      tags:
        - Events
  /events/{eventId}/schedules/{scheduleId}:
    patch:
      operationId: EventsController_updateSchedule
      parameters:
        - name: eventId
          required: true
          in: path
          schema:
            type: string
        - name: scheduleId
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateScheduleDto'
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Update event schedule (Admin only)
      tags:
        - Events
    delete:
      operationId: EventsController_removeSchedule
      parameters:
        - name: eventId
          required: true
          in: path
          schema:
            type: string
        - name: scheduleId
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Delete event schedule (Admin only)
      tags:
        - Events
  /events/{id}/register:
    post:
      operationId: EventsController_register
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '201':
          description: ''
      security:
        - user-auth: []
      summary: Register for an event as solo participant
      tags:
        - Events
  /events/{id}/unregister:
    delete:
      operationId: EventsController_unregister
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - user-auth: []
      summary: Unregister from an event (Authenticated participant)
      tags:
        - Events
  /events/{id}/participants:
    get:
      operationId: EventsController_getParticipants
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: limit
          required: false
          in: query
          description: Number of items to return
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
        - name: offset
          required: false
          in: query
          description: Number of items to skip
          schema:
            minimum: 0
            default: 0
            type: number
      responses:
        '200':
          description: ''
      summary: List event participants
      tags:
        - Events
  /participants/me:
    get:
      operationId: ParticipantsController_getMe
      parameters: []
      responses:
        '200':
          description: ''
      security:
        - user-auth: []
      summary: Get current participant profile
      tags:
        - Participants
    post:
      operationId: ParticipantsController_createProfile
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateParticipantDto'
      responses:
        '201':
          description: ''
      security:
        - user-auth: []
      summary: Create participant profile
      tags:
        - Participants
    patch:
      operationId: ParticipantsController_updateProfile
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateParticipantDto'
      responses:
        '200':
          description: ''
      security:
        - user-auth: []
      summary: Update participant profile
      tags:
        - Participants
  /participants/me/events:
    get:
      operationId: ParticipantsController_getMyEvents
      parameters: []
      responses:
        '200':
          description: ''
      security:
        - user-auth: []
      summary: Get events registered by current participant
      tags:
        - Participants
  /participants/{id}:
    get:
      operationId: ParticipantsController_findOne
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: Get participant public profile by ID
      tags:
        - Participants
  /teams:
    post:
      operationId: TeamsController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamDto'
      responses:
        '201':
          description: ''
      security:
        - user-auth: []
      summary: Create a new team (Authenticated participant)
      tags:
        - Teams
  /teams/{id}:
    get:
      operationId: TeamsController_findOne
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: Get team by ID with members and registered events
      tags:
        - Teams
    patch:
      operationId: TeamsController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamDto'
      responses:
        '200':
          description: ''
      security:
        - user-auth: []
      summary: Update team name (Team leader only)
