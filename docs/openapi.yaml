openapi: 3.0.0
paths:
  /colleges:
    get:
      operationId: CollegesController_findAll
      parameters:
        - name: limit
          required: false
          in: query
          description: Number of items to return
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
        - name: offset
          required: false
          in: query
          description: Number of items to skip
          schema:
            minimum: 0
            default: 0
            type: number
        - name: search
          required: false
          in: query
          description: Search term for college name or code
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    required:
                      - items
                      - total
                      - limit
                      - offset
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              description: College name
                              example: MIT
                            code:
                              type: string
                              description: College code
                              example: MIT001
                            location:
                              type: string
                              description: College location
                              example: Cambridge, MA
                          required:
                            - name
                            - code
                      total:
                        type: number
                        example: 1
                      limit:
                        type: number
                        example: 20
                      offset:
                        type: number
                        example: 0
              example:
                success: true
                data:
                  items:
                    - name: MIT
                      code: MIT001
                      location: Cambridge, MA
                  total: 1
                  limit: 20
                  offset: 0
      summary: List all colleges with pagination
      tags:
        - Colleges
    post:
      operationId: CollegesController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: College name
                  example: MIT
                code:
                  type: string
                  description: College code
                  example: MIT001
                location:
                  type: string
                  description: College location
                  example: Cambridge, MA
              required:
                - name
                - code
            example:
              name: MIT
              code: MIT001
              location: Cambridge, MA
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      name:
                        type: string
                        description: College name
                        example: MIT
                      code:
                        type: string
                        description: College code
                        example: MIT001
                      location:
                        type: string
                        description: College location
                        example: Cambridge, MA
                    required:
                      - name
                      - code
              example:
                success: true
                data:
                  name: MIT
                  code: MIT001
                  location: Cambridge, MA
      security:
        - team-auth: []
      summary: Create a new college (Admin only)
      tags:
        - Colleges
  /colleges/{id}:
    get:
      operationId: CollegesController_findOne
