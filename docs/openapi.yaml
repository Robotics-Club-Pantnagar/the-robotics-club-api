        - name: search
          required: false
          in: query
          description: Search by blog title
          schema:
            type: string
        - name: tags
          required: false
          in: query
          description: Filter by tags
          schema:
            type: array
            items:
              type: string
        - name: authorId
          required: false
          in: query
          description: Filter by author member ID
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: List published blogs with filters
      tags:
        - Blogs
    post:
      operationId: BlogsController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBlogDto'
      responses:
        '201':
          description: ''
      security:
        - team-auth: []
      summary: Create a new blog post (Member only)
      tags:
        - Blogs
  /blogs/slug/{slug}:
    get:
      operationId: BlogsController_findBySlug
      parameters:
        - name: slug
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: Get published blog by slug
      tags:
        - Blogs
  /blogs/{id}:
    get:
      operationId: BlogsController_findOne
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Get blog by ID (includes unpublished for author/admin)
      tags:
        - Blogs
    patch:
      operationId: BlogsController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBlogDto'
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Update blog post (Author or Admin only)
      tags:
        - Blogs
    delete:
      operationId: BlogsController_remove
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Delete blog post (Author or Admin only)
      tags:
        - Blogs
  /blogs/{id}/publish:
    patch:
      operationId: BlogsController_publish
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishBlogDto'
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Publish/unpublish blog post (Author or Admin only)
      tags:
        - Blogs
  /certificates/event/{eventId}/participant/{collegeIdNo}:
    get:
      operationId: CertificatesController_getCertificate
      parameters:
        - name: eventId
          required: true
          in: path
          schema:
            type: string
        - name: collegeIdNo
          required: true
          in: path
          schema:
            type: number
      responses:
        '200':
          description: ''
      summary: Download certificate PDF for participant (rate limited)
      tags:
        - Certificates
  /certificates/my-certificates:
    get:
      operationId: CertificatesController_getMyCertificates
      parameters: []
      responses:
        '200':
          description: ''
      security:
        - user-auth: []
      summary: Get list of certificates for authenticated participant
      tags:
        - Certificates
  /certificates/bulk-generate:
    post:
      operationId: CertificatesController_bulkGenerate
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkGenerateCertificatesDto'
      responses:
        '201':
          description: ''
      security:
        - team-auth: []
      summary: Bulk generate certificates for all event participants (Admin only)
      tags:
        - Certificates
  /webhooks/clerk/user:
    post:
      description: Receives participant Clerk webhook events. Verifies the svix-signature header before processing.
      operationId: WebhooksController_handleUserClerkWebhook
      parameters:
        - name: svix-id
          required: true
          in: header
          description: Svix webhook ID
          schema:
            type: string
        - name: svix-timestamp
          required: true
          in: header
          description: Svix timestamp
          schema:
            type: string
        - name: svix-signature
          required: true
          in: header
          description: Svix signature for verification
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: Handle participant Clerk webhook events
      tags:
        - Webhooks
  /webhooks/clerk/team:
    post:
      description: Receives team/member Clerk webhook events. Verifies the svix-signature header before processing.
      operationId: WebhooksController_handleTeamClerkWebhook
      parameters:
        - name: svix-id
          required: true
          in: header
          description: Svix webhook ID
          schema:
            type: string
        - name: svix-timestamp
          required: true
          in: header
          description: Svix timestamp
          schema:
            type: string
        - name: svix-signature
          required: true
          in: header
          description: Svix signature for verification
          schema:
            type: string
      responses:
        '200':
          description: ''
      summary: Handle team/member Clerk webhook events
      tags:
        - Webhooks
info:
  title: The Robotics Club API
  description: API for the college robotics club management platform
  version: 1.0.0
  contact: {}
tags:
  - name: Colleges
    description: College management endpoints
  - name: Departments
    description: Department management endpoints
  - name: Events
    description: Event management and registration endpoints
  - name: Participants
    description: External participant management endpoints
  - name: Teams
    description: Event team management endpoints
  - name: Members
    description: Club member management endpoints
  - name: Positions
    description: Member position management endpoints
  - name: Projects
    description: Project portfolio management endpoints
  - name: Blogs
    description: Blog post management endpoints
  - name: Certificates
    description: Certificate generation endpoints
servers:
  - url: http://localhost:3000
    description: Local Development
  - url: https://api.roboticsclub.example.com
    description: Production
components:
  securitySchemes:
    user-auth:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: Clerk JWT token for participants (external users)
    team-auth:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: Clerk JWT token for club members/admins
  schemas:
    CreateCollegeDto:
      type: object
      properties:
        name:
          type: string
          description: College name
          example: MIT
        code:
          type: string
          description: College code
          example: MIT001
        location:
          type: string
          description: College location
          example: Cambridge, MA
      required:
        - name
        - code
    UpdateCollegeDto:
      type: object
      properties:
        name:
          type: string
          description: College name
        code:
          type: string
          description: College code
        location:
          type: string
          description: College location
    CreateDepartmentDto:
      type: object
      properties:
        name:
          type: string
          description: Department name
          example: Computer Science
        code:
          type: string
          description: Department code
          example: CS
        collegeId:
          type: string
          description: College ID this department belongs to
      required:
        - name
        - code
        - collegeId
    UpdateDepartmentDto:
      type: object
      properties:
        name:
          type: string
          description: Department name
        code:
          type: string
          description: Department code
    CreateEventDto:
      type: object
      properties:
        title:
          type: string
          description: Event title
          example: Robotics Workshop 2024
        description:
          type: string
          description: Event description
        eventType:
          type: string
          description: Event type
          enum:
            - INDUCTION
            - WORKSHOP
            - COMPETITION
            - SEMINAR
            - HACKATHON
            - MEETUP
            - OTHER
        hasTeam:
          type: boolean
          description: Whether this is a team-based event
          default: false
        maxTeamMembers:
          type: number
          description: Maximum team members (required if hasTeam is true)
          minimum: 2
        maxParticipants:
          type: number
          description: Maximum participants allowed
          minimum: 1
        registrationDeadline:
          type: string
          description: Registration deadline (ISO 8601 date)
          example: '2024-12-31T23:59:59Z'
      required:
        - title
        - description
        - eventType
        - registrationDeadline
    UpdateEventDto:
      type: object
      properties:
        title:
          type: string
          description: Event title
        description:
          type: string
          description: Event description
        eventType:
          type: string
          description: Event type
          enum:
            - INDUCTION
            - WORKSHOP
            - COMPETITION
            - SEMINAR
            - HACKATHON
            - MEETUP
            - OTHER
        hasTeam:
          type: boolean
          description: Whether this is a team-based event
        maxTeamMembers:
          type: number
          description: Maximum team members
          minimum: 2
        maxParticipants:
          type: number
          description: Maximum participants
          minimum: 1
        registrationDeadline:
          type: string
          description: Registration deadline (ISO 8601 date)
    CreateScheduleDto:
      type: object
      properties:
        day:
          type: string
          description: Schedule date (ISO 8601)
          example: '2024-12-01'
        startTime:
          type: string
          description: Start time (HH:MM)
          example: '09:00'
        endTime:
          type: string
          description: End time (HH:MM)
          example: '17:00'
        location:
          type: string
          description: Location
          example: Main Auditorium
        notes:
          type: string
          description: Additional notes
      required:
        - day
        - startTime
        - endTime
        - location
    UpdateScheduleDto:
      type: object
      properties:
        day:
          type: string
          description: Schedule date (ISO 8601)
        startTime:
          type: string
          description: Start time (HH:MM)
        endTime:
          type: string
          description: End time (HH:MM)
        location:
          type: string
          description: Location
        notes:
          type: string
          description: Additional notes
    CreateParticipantDto:
      type: object
      properties:
        name:
          type: string
          description: Full name
          example: John Doe
        email:
          type: string
          description: Email address
          example: john@example.com
        username:
          type: string
          description: Username (lowercase, numbers, underscores only)
          example: john_doe
        imageUrl:
          type: string
          description: Profile image URL
        phone:
          type: string
          description: Phone number
        collegeId:
          type: string
          description: College ID
        departmentId:
          type: string
          description: Department ID
        collegeIdNo:
          type: number
          description: College ID number (roll number)
          example: 12345
        year:
          type: string
          description: Academic year
          example: 3rd Year
      required:
        - name
        - email
        - username
        - imageUrl
        - collegeId
        - departmentId
        - collegeIdNo
    UpdateParticipantDto:
      type: object
      properties:
        name:
          type: string
          description: Full name
        imageUrl:
          type: string
          description: Profile image URL
        phone:
          type: string
          description: Phone number
        year:
          type: string
          description: Academic year
    CreateTeamDto:
      type: object
      properties:
        name:
          type: string
          description: Team name
          example: Robo Warriors
      required:
        - name
    UpdateTeamDto:
      type: object
      properties:
        name:
          type: string
          description: Team name
    TransferLeadershipDto:
      type: object
      properties:
        newLeaderId:
          type: string
          description: Participant ID to transfer leadership to
      required:
        - newLeaderId
    JoinTeamRequestDto:
      type: object
      properties:
        eventId:
          type: string
          description: Event ID for this join request
      required:
        - eventId
    ReviewJoinRequestDto:
      type: object
      properties:
        eventId:
          type: string
          description: Event ID for this join request
        action:
          type: string
          description: Decision for the participant join request
          enum:
            - APPROVE
            - REJECT
      required:
        - eventId
        - action
    InviteMemberDto:
      type: object
      properties:
        name:
          type: string
          description: Full name
          example: Jane Smith
        email:
          type: string
          description: Email address
          example: jane@example.com
        username:
          type: string
          description: Username (lowercase, numbers, underscores only)
          example: jane_smith
        collegeId:
          type: string
          description: College ID
        departmentId:
          type: string
          description: Department ID
        collegeIdNo:
          type: number
          description: College ID number (roll number)
          example: 12345
        graduationYear:
          type: number
          description: Expected graduation year
          example: 2025
          minimum: 2000
          maximum: 2100
        imageUrl:
          type: string
          description: Profile image URL
      required:
        - name
        - email
        - username
        - collegeId
        - departmentId
        - collegeIdNo
        - imageUrl
    UpdateMemberDto:
      type: object
      properties:
        name:
          type: string
          description: Full name
        imageUrl:
          type: string
          description: Profile image URL
        phone:
          type: string
          description: Phone number
        bio:
          type: string
          description: Bio
        graduationYear:
          type: number
          description: Graduation year
          minimum: 2000
          maximum: 2100
        instagram:
          type: string
          description: Instagram handle
        linkedin:
          type: string
          description: LinkedIn URL
        github:
          type: string
          description: GitHub username
    CreatePositionDto:
      type: object
      properties:
        position:
          type: string
          description: Position title
          enum:
            - CHAIRPERSON
            - VICE_CHAIRPERSON
            - TREASURER
            - TECHNICAL_HEAD
            - CODING_HEAD
            - LOGISTICS_HEAD
            - EXECUTIVE_MEMBER
            - MEMBER
        startMonth:
          type: number
          description: Start month (1-12)
          example: 1
          minimum: 1
          maximum: 12
        startYear:
          type: number
          description: Start year
          example: 2024
          minimum: 2000
          maximum: 2100
        endMonth:
          type: number
          description: End month (1-12, null for current)
          minimum: 1
          maximum: 12
        endYear:
          type: number
          description: End year (null for current)
          minimum: 2000
          maximum: 2100
      required:
        - position
        - startMonth
        - startYear
    UpdatePositionDto:
      type: object
      properties:
        position:
          type: string
          description: Position title
          enum:
            - CHAIRPERSON
            - VICE_CHAIRPERSON
            - TREASURER
            - TECHNICAL_HEAD
            - CODING_HEAD
            - LOGISTICS_HEAD
            - EXECUTIVE_MEMBER
            - MEMBER
        startMonth:
          type: number
          description: Start month (1-12)
          minimum: 1
          maximum: 12
        startYear:
          type: number
          description: Start year
          minimum: 2000
          maximum: 2100
        endMonth:
          type: number
          description: End month (1-12)
          minimum: 1
          maximum: 12
        endYear:
          type: number
          description: End year
          minimum: 2000
          maximum: 2100
    CreateProjectDto:
      type: object
      properties:
        title:
          type: string
          description: Project title
          example: Autonomous Robot
        description:
          type: string
          description: Short project description
        content:
          type: object
          description: Rich content (Quill Delta JSON)
        contentHtml:
          type: string
          description: HTML representation of content
        imageUrl:
          type: string
          description: Project image URL
        githubRepo:
          type: string
          description: GitHub repository URL
        demoUrl:
          type: string
          description: Demo/live URL
        tags:
          description: Project tags
          type: array
          items:
            type: string
      required:
        - title
        - description
        - content
        - contentHtml
    UpdateProjectDto:
      type: object
      properties:
        title:
          type: string
          description: Project title
        description:
          type: string
          description: Project description
        content:
          type: object
          description: Rich content (Quill Delta JSON)
        contentHtml:
          type: string
          description: HTML representation of content
        imageUrl:
          type: string
          description: Project image URL
        githubRepo:
          type: string
          description: GitHub repository URL
        demoUrl:
          type: string
          description: Demo/live URL
        tags:
          description: Project tags
          type: array
          items:
            type: string
    AddProjectMemberDto:
      type: object
      properties:
        memberId:
          type: string
          description: Member ID to add to project
        role:
          type: string
          description: Role in project
          example: Lead Developer
      required:
        - memberId
    CreateBlogDto:
      type: object
      properties:
        title:
          type: string
          description: Blog title
          example: Getting Started with Robotics
        slug:
          type: string
          description: URL slug (auto-generated if not provided)
          example: getting-started-robotics
        excerpt:
          type: string
          description: Short excerpt/summary
        content:
          type: object
          description: Rich content (Quill Delta JSON)
        contentHtml:
          type: string
          description: HTML representation of content
        coverImage:
          type: string
          description: Cover image URL
        tags:
          description: Blog tags
          type: array
          items:
            type: string
        published:
          type: boolean
          description: Publish immediately
          default: false
      required:
        - title
        - excerpt
        - content
        - contentHtml
    UpdateBlogDto:
      type: object
      properties:
        title:
          type: string
          description: Blog title
        slug:
          type: string
          description: URL slug
        excerpt:
          type: string
          description: Short excerpt/summary
        content:
          type: object
          description: Rich content (Quill Delta JSON)
        contentHtml:
          type: string
          description: HTML representation of content
        coverImage:
          type: string
          description: Cover image URL
        tags:
          description: Blog tags
          type: array
          items:
            type: string
    PublishBlogDto:
      type: object
      properties:
        published:
          type: boolean
          description: Publish status (true=publish, false=unpublish)
      required:
        - published
    BulkGenerateCertificatesDto:
      type: object
      properties:
        eventId:
          type: string
          description: Event ID to generate certificates for
      required:
        - eventId
