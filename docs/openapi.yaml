        - Projects
    delete:
      operationId: ProjectsController_remove
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Delete project (Project creator or Admin only)
      tags:
        - Projects
  /projects/{id}/members:
    post:
      operationId: ProjectsController_addMember
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProjectMemberDto'
      responses:
        '201':
          description: ''
      security:
        - team-auth: []
      summary: Add member to project (Project member only)
      tags:
        - Projects
  /projects/{projectId}/members/{memberId}:
    delete:
      operationId: ProjectsController_removeMember
      parameters:
        - name: projectId
          required: true
          in: path
          schema:
            type: string
        - name: memberId
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      security:
        - team-auth: []
      summary: Remove member from project (Project member only)
      tags:
        - Projects
  /blogs:
    get:
      operationId: BlogsController_findAll
      parameters:
        - name: limit
          required: false
