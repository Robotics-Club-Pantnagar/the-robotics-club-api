  /events/{id}/schedules:
    post:
      operationId: EventsController_addSchedule
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                day:
                  type: string
                  description: Schedule date (ISO 8601)
                  example: '2024-12-01'
                startTime:
                  type: string
                  description: Start time (HH:MM)
                  example: '09:00'
                endTime:
                  type: string
                  description: End time (HH:MM)
                  example: '17:00'
                location:
                  type: string
                  description: Location
                  example: Main Auditorium
                notes:
                  type: string
                  description: Additional notes
              required:
                - day
                - startTime
                - endTime
                - location
            example:
              day: '2024-12-01'
              startTime: '09:00'
              endTime: '17:00'
              location: Main Auditorium
              notes: string
