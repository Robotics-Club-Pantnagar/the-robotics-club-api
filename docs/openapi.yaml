  /events:
    get:
      operationId: EventsController_findAll
      parameters:
        - name: limit
          required: false
          in: query
          description: Number of items to return
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
        - name: offset
          required: false
          in: query
          description: Number of items to skip
          schema:
            minimum: 0
            default: 0
            type: number
        - name: search
          required: false
          in: query
          description: Search by event title
          schema:
            type: string
        - name: eventType
          required: false
          in: query
          description: Filter by event type
          schema:
            type: string
            enum:
              - INDUCTION
              - WORKSHOP
              - COMPETITION
              - SEMINAR
              - HACKATHON
              - MEETUP
              - OTHER
        - name: hasTeam
          required: false
          in: query
          description: Filter team-based events
          schema:
            type: boolean
        - name: upcoming
          required: false
          in: query
          description: Filter upcoming events only
          schema:
            type: boolean
        - name: past
          required: false
          in: query
          description: Filter past events only
          schema:
            type: boolean
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    required:
                      - items
                      - total
                      - limit
                      - offset
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            title:
                              type: string
                              description: Event title
                              example: Robotics Workshop 2024
                            description:
                              type: string
                              description: Event description
                            eventType:
                              type: string
                              description: Event type
                              enum:
                                - INDUCTION
                                - WORKSHOP
                                - COMPETITION
                                - SEMINAR
                                - HACKATHON
                                - MEETUP
                                - OTHER
                            hasTeam:
                              type: boolean
                              default: false
                              description: Whether this is a team-based event
                            maxTeamMembers:
                              type: number
                              minimum: 2
                              description: Maximum team members (required if hasTeam is true)
                            maxParticipants:
                              type: number
                              minimum: 1
                              description: Maximum participants allowed
                            registrationDeadline:
                              type: string
                              description: Registration deadline (ISO 8601 date)
                              example: '2024-12-31T23:59:59Z'
                          required:
                            - title
                            - description
                            - eventType
                            - registrationDeadline
                      total:
                        type: number
                        example: 1
                      limit:
                        type: number
                        example: 20
                      offset:
                        type: number
                        example: 0
              example:
                success: true
                data:
                  items:
                    - title: Robotics Workshop 2024
                      description: string
                      eventType: INDUCTION
                      registrationDeadline: '2024-12-31T23:59:59Z'
                      hasTeam: false
                      maxTeamMembers: 2
                      maxParticipants: 1
                  total: 1
                  limit: 20
                  offset: 0
      summary: List all events with filters and pagination
      tags:
        - Events
    post:
      operationId: EventsController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Event title
                  example: Robotics Workshop 2024
                description:
                  type: string
                  description: Event description
                eventType:
                  type: string
                  description: Event type
                  enum:
                    - INDUCTION
                    - WORKSHOP
                    - COMPETITION
                    - SEMINAR
                    - HACKATHON
                    - MEETUP
                    - OTHER
                hasTeam:
                  type: boolean
                  default: false
                  description: Whether this is a team-based event
                maxTeamMembers:
                  type: number
                  minimum: 2
                  description: Maximum team members (required if hasTeam is true)
                maxParticipants:
                  type: number
                  minimum: 1
                  description: Maximum participants allowed
                registrationDeadline:
                  type: string
                  description: Registration deadline (ISO 8601 date)
                  example: '2024-12-31T23:59:59Z'
              required:
                - title
                - description
                - eventType
                - registrationDeadline
            example:
              title: Robotics Workshop 2024
              description: string
              eventType: INDUCTION
              registrationDeadline: '2024-12-31T23:59:59Z'
              hasTeam: false
              maxTeamMembers: 2
              maxParticipants: 1
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      title:
                        type: string
                        description: Event title
                        example: Robotics Workshop 2024
                      description:
                        type: string
                        description: Event description
                      eventType:
                        type: string
                        description: Event type
                        enum:
                          - INDUCTION
                          - WORKSHOP
                          - COMPETITION
                          - SEMINAR
                          - HACKATHON
                          - MEETUP
                          - OTHER
                      hasTeam:
                        type: boolean
                        default: false
                        description: Whether this is a team-based event
                      maxTeamMembers:
                        type: number
                        minimum: 2
                        description: Maximum team members (required if hasTeam is true)
                      maxParticipants:
                        type: number
                        minimum: 1
                        description: Maximum participants allowed
                      registrationDeadline:
                        type: string
                        description: Registration deadline (ISO 8601 date)
                        example: '2024-12-31T23:59:59Z'
                    required:
                      - title
                      - description
                      - eventType
                      - registrationDeadline
              example:
                success: true
                data:
                  title: Robotics Workshop 2024
                  description: string
                  eventType: INDUCTION
                  registrationDeadline: '2024-12-31T23:59:59Z'
                  hasTeam: false
                  maxTeamMembers: 2
                  maxParticipants: 1
      security:
        - team-auth: []
      summary: Create a new event (Admin only)
      tags:
        - Events
