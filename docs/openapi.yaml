                data:
                  items:
                    - title: Robotics Workshop 2024
                      description: string
                      eventType: INDUCTION
                      registrationDeadline: '2024-12-31T23:59:59Z'
                      hasTeam: false
                      maxTeamMembers: 2
                      maxParticipants: 1
                  total: 1
                  limit: 20
                  offset: 0
        '400':
          $ref: '#/components/responses/CommonBadRequest'
        '429':
