          required: false
          in: query
          description: Search by event title
          schema:
            type: string
        - name: eventType
          required: false
          in: query
          description: Filter by event type
          schema:
            type: string
            enum:
              - INDUCTION
              - WORKSHOP
              - COMPETITION
              - SEMINAR
              - HACKATHON
              - MEETUP
              - OTHER
        - name: hasTeam
          required: false
          in: query
          description: Filter team-based events
          schema:
            type: boolean
        - name: upcoming
          required: false
          in: query
          description: Filter upcoming events only
          schema:
            type: boolean
        - name: past
          required: false
          in: query
          description: Filter past events only
          schema:
            type: boolean
      responses:
