              schema:
                type: object
                properties:
                  jobsQueued:
                    type: number
                    description: Number of jobs queued
                  eventId:
                    type: string
                    description: Event ID
                  message:
                    type: string
                    description: Status message
                required:
                  - jobsQueued
                  - eventId
                  - message
              example:
                jobsQueued: 1
                eventId: string
                message: string
      security:
        - team-auth: []
      summary: Bulk generate certificates for all event participants (Admin only)
      tags:
        - Certificates
